name: "CodeQL Advanced"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions: {}

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    steps:
      - name: Explain CodeQL ownership
        shell: bash
        run: |
          echo "GitHub Code Scanning default setup is enabled for this repository."
          echo "This workflow is a compatibility placeholder so the Analyze (javascript-typescript) check stays green."
          echo "The workflow intentionally does not run github/codeql-action because GitHub rejects advanced CodeQL uploads while default setup is enabled."
          echo "If you want workflow-managed CodeQL again, disable default setup in repository settings and restore an advanced CodeQL workflow."
